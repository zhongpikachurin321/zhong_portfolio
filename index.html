<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钟裕 - 设计作品集</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0e0e10; /* 深色暗黑背景 */
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-bottom: 60px;
        }

        /* 顶部固定的极简提示条 */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(14, 14, 16, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            padding: 12px 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 9999;
        }

        .nav-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .nav-status {
            font-size: 12px;
            color: #a1a1aa;
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 12px;
            border-radius: 12px;
            transition: all 0.2s ease; 
        }

        /* 作品集图片容器 */
        .portfolio-container {
            width: 100%;
            max-width: 1280px; 
            margin-top: 60px;  
            padding: 0 20px;   
            display: flex;
            flex-direction: column;
            gap: 16px; 
        }

        /* 图片包裹盒子（兼作图片未加载出来的占位符） */
        .page-box {
            width: 100%;
            min-height: 400px; /* 给未加载的图片一个基础占位高度，防止页面塌陷 */
            background-color: #18181b; /* 质感暗色占位背景 */
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.4);
            position: relative; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .page-box:hover {
            transform: translateY(-2px);
        }

        /* 真实的图片样式 */
        .page-box img {
            width: 100%;
            height: auto;
            display: block; 
            opacity: 0; /* 初始隐藏，等待加载完成后淡入 */
            transition: opacity 0.4s ease; /* 优雅的淡入动效 */
            position: relative;
            z-index: 2;
        }

        /* 当图片加载完成时显示图片 */
        .page-box img.loaded {
            opacity: 1;
        }

        /* 圆圈加载进度条（Spinner） */
        .loading-ring {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1); 
            border-radius: 50%;
            border-top-color: #ffffff; 
            position: absolute;
            z-index: 1;
            animation: spin 1s ease-in-out infinite; 
            transition: opacity 0.3s ease;
        }

        /* 当图片加载好后，隐藏圆圈 */
        .loading-ring.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 圆圈旋转动画 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 针对手机端界面的自适应调优 */
        @media (max-width: 768px) {
            .top-navbar {
                padding: 12px 16px;
            }
            .portfolio-container {
                padding: 0 8px;
                gap: 8px; 
            }
            .page-box {
                min-height: 200px; 
            }
            .nav-status {
                font-size: 11px;
                padding: 2px 8px;
            }
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="nav-title">ZHONG YU · 设计作品集</div>
        <div class="nav-status" id="status-text">第 1 / 47 页</div>
    </div>

    <div class="portfolio-container" id="portfolio">
        <script>
            const container = document.getElementById('portfolio');
            const statusText = document.getElementById('status-text');
            const totalPages = 47;
            const imgElements = []; 

            // 1. 结构初始化：一次性把 47 个页面格子和圆圈塞进网页
            for (let i = 1; i <= totalPages; i++) {
                const pageBox = document.createElement('div');
                pageBox.className = 'page-box';
                pageBox.setAttribute('data-page', i); 

                const spinner = document.createElement('div');
                spinner.className = 'loading-ring';
                spinner.id = `spinner-${i}`;
                pageBox.appendChild(spinner);

                const img = document.createElement('img');
                img.alt = `作品集第 ${i} 页`;
                img.id = `img-${i}`;

                pageBox.appendChild(img);
                container.appendChild(pageBox);
                
                imgElements.push(img); 
            }

            // 2. 核心算法：按顺序、串行预加载图片（已修改为 .jpg 后缀）
            function preloadImageSequence(index) {
                if (index > totalPages) return; 

                const img = document.getElementById(`img-${index}`);
                const spinner = document.getElementById(`spinner-${index}`);

                // 已修改：图片路径格式恢复为 .jpg
                img.src = `images/${index}.jpg`;

                // 监听当前图片下载完成
                img.onload = function() {
                    img.classList.add('loaded'); 
                    spinner.classList.add('hidden'); 
                    
                    // 当前这张图好了，立刻腾出网速去加载下一张
                    preloadImageSequence(index + 1);
                };

                // 容错处理
                img.onerror = function() {
                    spinner.classList.add('hidden');
                    preloadImageSequence(index + 1);
                };
            }

            // 启动链式预加载
            preloadImageSequence(1);


            // 3. 智能视口观察器：滚动时精准更新页码
            const observerOptions = {
                root: null, 
                rootMargin: '-20% 0px -40% 0px', 
                threshold: 0
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const currentPage = entry.target.getAttribute('data-page');
                        statusText.innerText = `第 ${currentPage} / 47 页`;
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.page-box').forEach(box => {
                observer.observe(box);
            });
        </script>
    </div>

</body>
</html>
